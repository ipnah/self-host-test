# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  foo:
    # The type of runner that the job will run on
    runs-on: [self-hosted, vivado]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Check network
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Get-SshPort {
            $defaultPort = 22
            $sshdConfig = 'C:\ProgramData\ssh\sshd_config'

            if (-not (Test-Path $sshdConfig)) {
              Write-Host "sshd_config not found, fallback to port $defaultPort"
              return $defaultPort
            }

            $portLine = Get-Content $sshdConfig |
              Where-Object { $_ -match '^\s*Port\s+\d+\s*$' } |
              Select-Object -First 1

            if (-not $portLine) {
              Write-Host "SSH port not configured explicitly, fallback to port $defaultPort"
              return $defaultPort
            }

            return [int](($portLine -split '\s+')[1])
          }

          function Ensure-SshFirewallRule {
            param(
              [Parameter(Mandatory = $true)]
              [int]$Port
            )

            $ruleName = "GitHub Actions Allow SSH Port $Port"
            $openRule = Get-NetFirewallRule -Direction Inbound -Action Allow -Enabled True -ErrorAction SilentlyContinue |
              Get-NetFirewallPortFilter -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Protocol -eq 'TCP' -and
                $_.LocalPort -eq $Port
              } |
              Select-Object -First 1

            if ($openRule) {
              Write-Host "Inbound TCP port $Port is already allowed by firewall."
              return
            }

            New-NetFirewallRule `
              -DisplayName $ruleName `
              -Direction Inbound `
              -Action Allow `
              -Enabled True `
              -Profile Any `
              -Protocol TCP `
              -LocalPort $Port | Out-Null

            Write-Host "Opened inbound TCP port $Port in Windows Firewall."
          }

          function Ensure-IcmpEchoFirewallRule {
            $icmpRule = Get-NetFirewallRule -DisplayGroup 'File and Printer Sharing' -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Direction -eq 'Inbound' -and
                $_.Enabled -eq 'True' -and
                $_.Action -eq 'Allow'
              } |
              Get-NetFirewallPortFilter -ErrorAction SilentlyContinue |
              Where-Object { $_.Protocol -eq 'ICMPv4' } |
              Select-Object -First 1

            if ($icmpRule) {
              Write-Host "ICMPv4 echo is already allowed by firewall."
              return
            }

            $defaultRule = Get-NetFirewallRule -DisplayName 'File and Printer Sharing (Echo Request - ICMPv4-In)' -ErrorAction SilentlyContinue

            if ($defaultRule) {
              Enable-NetFirewallRule -DisplayName 'File and Printer Sharing (Echo Request - ICMPv4-In)' | Out-Null
              Write-Host "Enabled built-in ICMPv4 echo firewall rule."
              return
            }

            New-NetFirewallRule `
              -DisplayName 'GitHub Actions Allow ICMPv4 Echo Request' `
              -Direction Inbound `
              -Action Allow `
              -Enabled True `
              -Profile Any `
              -Protocol ICMPv4 `
              -IcmpType 8 | Out-Null

            Write-Host "Created ICMPv4 echo firewall rule."
          }

          function Show-SshDiagnostics {
            param(
              [Parameter(Mandatory = $true)]
              [int]$Port
            )

            Write-Host ''
            Write-Host '=== SSH diagnostics ==='

            $sshdService = Get-Service sshd -ErrorAction SilentlyContinue
            if ($sshdService) {
              $sshdServiceInfo = Get-CimInstance Win32_Service -Filter "Name='sshd'" -ErrorAction SilentlyContinue
              Write-Host "sshd service status: $($sshdService.Status)"
              Write-Host "sshd service start type: $($sshdServiceInfo.StartMode)"
            } else {
              Write-Host "sshd service status: not installed"
            }

            $sshdConfig = 'C:\ProgramData\ssh\sshd_config'
            Write-Host "sshd_config path: $sshdConfig"
            if (Test-Path $sshdConfig) {
              Write-Host 'Relevant sshd_config lines:'
              Get-Content $sshdConfig |
                Where-Object { $_ -match '^\s*(#\s*)?(Port|ListenAddress|PubkeyAuthentication)\b' } |
                ForEach-Object { Write-Host $_ }
            } else {
              Write-Host 'sshd_config not found'
            }

            Write-Host "Listening sockets for TCP port $Port:"
            $listeners = Get-NetTCPConnection -LocalPort $Port -State Listen -ErrorAction SilentlyContinue
            if ($listeners) {
              $listeners | Select-Object LocalAddress, LocalPort, OwningProcess |
                Format-Table -AutoSize | Out-String | Write-Host
            } else {
              Write-Host "No listening socket found on TCP port $Port"
            }

            Write-Host "Local TCP probe to 127.0.0.1:$Port"
            Test-NetConnection -ComputerName 127.0.0.1 -Port $Port -InformationLevel Detailed
          }

          function Show-FirewallDiagnostics {
            param(
              [Parameter(Mandatory = $true)]
              [int]$Port
            )

            Write-Host ''
            Write-Host '=== Firewall diagnostics ==='

            $sshRules = Get-NetFirewallRule -Direction Inbound -ErrorAction SilentlyContinue |
              Where-Object { $_.Enabled -eq 'True' } |
              ForEach-Object {
                $rule = $_
                $portFilters = $rule | Get-NetFirewallPortFilter -ErrorAction SilentlyContinue
                foreach ($portFilter in $portFilters) {
                  if ($portFilter.Protocol -eq 'TCP' -and $portFilter.LocalPort -eq $Port) {
                    [pscustomobject]@{
                      DisplayName = $rule.DisplayName
                      Action = $rule.Action
                      Enabled = $rule.Enabled
                      Profile = $rule.Profile
                      Protocol = $portFilter.Protocol
                      LocalPort = $portFilter.LocalPort
                    }
                  }
                }
              }

            if ($sshRules) {
              Write-Host "Inbound firewall rules matching TCP port $Port:"
              $sshRules | Format-Table -AutoSize | Out-String | Write-Host
            } else {
              Write-Host "No enabled inbound firewall rule found for TCP port $Port"
            }

            $icmpRules = Get-NetFirewallRule -Direction Inbound -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Enabled -eq 'True' -and $_.Action -eq 'Allow'
              } |
              ForEach-Object {
                $rule = $_
                $portFilters = $rule | Get-NetFirewallPortFilter -ErrorAction SilentlyContinue
                foreach ($portFilter in $portFilters) {
                  if ($portFilter.Protocol -eq 'ICMPv4') {
                    [pscustomobject]@{
                      DisplayName = $rule.DisplayName
                      Action = $rule.Action
                      Enabled = $rule.Enabled
                      Profile = $rule.Profile
                      Protocol = $portFilter.Protocol
                    }
                  }
                }
              }

            if ($icmpRules) {
              Write-Host 'Enabled inbound ICMPv4 allow rules:'
              $icmpRules | Format-Table -AutoSize | Out-String | Write-Host
            } else {
              Write-Host 'No enabled inbound ICMPv4 allow rule found'
            }
          }

          $sshPort = Get-SshPort
          Write-Host "Resolved SSH port: $sshPort"
          Ensure-SshFirewallRule -Port $sshPort
          Ensure-IcmpEchoFirewallRule
          Show-SshDiagnostics -Port $sshPort
          Show-FirewallDiagnostics -Port $sshPort

          ipconfig
          ping -n 3 www.baidu.com
          ping -n 3 www.github.com
          ping -n 3 10.37.142.130

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
