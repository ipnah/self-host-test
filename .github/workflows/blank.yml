# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  foo:
    # The type of runner that the job will run on
    runs-on: [self-hosted, vivado]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run
        run: |
          ipconfig

      - name: Add ci.pub to administrators_authorized_keys
        run: |
          $ErrorActionPreference = 'Stop'

          $PubKeyPath = Join-Path $env:GITHUB_WORKSPACE 'ci.pub'
          $SshDir = 'C:\ProgramData\ssh'
          $SshdConfig = Join-Path $SshDir 'sshd_config'
          $AdminKeysFile = Join-Path $SshDir 'administrators_authorized_keys'

          if (-not (Test-Path $PubKeyPath)) {
            throw "Public key file not found: $PubKeyPath"
          }

          $PubKey = (Get-Content $PubKeyPath -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($PubKey)) {
            throw "Public key file is empty: $PubKeyPath"
          }

          if (-not (Test-Path $SshDir)) {
            New-Item -Path $SshDir -ItemType Directory -Force | Out-Null
          }

          if (-not (Test-Path $SshdConfig)) {
            throw "sshd_config not found: $SshdConfig"
          }

          if (-not (Test-Path $AdminKeysFile)) {
            New-Item -Path $AdminKeysFile -ItemType File -Force | Out-Null
          }

          # 确保启用公钥认证
          $config = Get-Content $SshdConfig -Raw

          if ($config -match '(?m)^\s*#?\s*PubkeyAuthentication\s+') {
            $config = [regex]::Replace(
              $config,
              '(?m)^\s*#?\s*PubkeyAuthentication\s+.*$',
              'PubkeyAuthentication yes'
            )
          } else {
            $config = $config.TrimEnd() + "`r`nPubkeyAuthentication yes`r`n"
          }

          # 确保管理员组走 administrators_authorized_keys
          if ($config -notmatch '(?ms)Match Group administrators.*?AuthorizedKeysFile\s+__PROGRAMDATA__/ssh/administrators_authorized_keys') {
            $config = $config.TrimEnd() + @"

          Match Group administrators
              AuthorizedKeysFile __PROGRAMDATA__/ssh/administrators_authorized_keys
          "@
          }

          Set-Content -Path $SshdConfig -Value $config -Encoding ascii

          # 追加公钥（去重）
          $existing = @()
          if (Test-Path $AdminKeysFile) {
            $existing = Get-Content $AdminKeysFile | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }

          if ($existing -contains $PubKey) {
            Write-Host "Public key already present in $AdminKeysFile"
          } else {
            Add-Content -Path $AdminKeysFile -Value $PubKey
            Write-Host "Public key added to $AdminKeysFile"
          }

          # 设置 Microsoft 推荐的关键 ACL：
          # administrators_authorized_keys 需要 SYSTEM 和 BUILTIN\Administrators
          icacls $AdminKeysFile /inheritance:r | Out-Null
          icacls $AdminKeysFile /grant 'NT AUTHORITY\SYSTEM:F' | Out-Null
          icacls $AdminKeysFile /grant 'BUILTIN\Administrators:F' | Out-Null

          # 启动或重启 sshd
          $sshd = Get-Service sshd -ErrorAction SilentlyContinue
          if (-not $sshd) {
            throw "OpenSSH Server service 'sshd' is not installed."
          }

          if ($sshd.Status -eq 'Running') {
            Restart-Service sshd -Force
            Write-Host "sshd restarted"
          } else {
            Start-Service sshd
            Write-Host "sshd started"
          }

      - name: Show effective target files
        run: |
          Write-Host "User: $env:USERNAME"
          Write-Host "Expected authorized keys file for admin-group users:"
          Write-Host "C:\ProgramData\ssh\administrators_authorized_keys"
          Write-Host ""
          Write-Host "Current file content:"
          Get-Content 'C:\ProgramData\ssh\administrators_authorized_keys'
